name: AI Lint & Dependency Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - master
      - production

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-deps-check:
    name: Claude Lint & Dependency Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic==0.88.0

      - name: Generate diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Run Claude lint & dependency check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 .github/scripts/lint_deps_check.py < /tmp/pr_diff.txt > /tmp/lint_output.txt

      - name: Parse verdict
        id: verdict
        run: |
          output=$(cat /tmp/lint_output.txt)
          if echo "$output" | grep -q "Verdict" && echo "$output" | grep -q "BLOCK"; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "label=BLOCK — lint/dependency issues prevent merging" >> "$GITHUB_OUTPUT"
          elif echo "$output" | grep -q "PASS WITH WARNINGS"; then
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "label=PASS WITH WARNINGS — review suggestions before merging" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "label=PASS — no lint or dependency issues found" >> "$GITHUB_OUTPUT"
          fi

      - name: Post lint & dependency findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const findings = fs.readFileSync('/tmp/lint_output.txt', 'utf8').trim();
            if (!findings || findings.startsWith('No diff found')) {
              core.info('Nothing to comment — diff was empty.');
              return;
            }
            const marker = '<!-- ai-lint-deps-check -->';
            const body = `${marker}\n## 🔍 AI Lint & Dependency Check — Claude\n\n${findings}`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existingComment = comments.data.find((comment) =>
              comment.user &&
              comment.user.type === 'Bot' &&
              comment.user.login === 'github-actions[bot]' &&
              comment.body &&
              comment.body.includes(marker)
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail workflow on BLOCK verdict
        if: steps.verdict.outputs.status == 'failure'
        run: |
          echo "::error::${{ steps.verdict.outputs.label }}"
          exit 1
