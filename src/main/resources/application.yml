spring:
  application:
    name: graphql-ms

  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://localhost:27017/graphqlms}
      auto-index: true

  graphql:
    graphiql:
      # Enable the GraphiQL browser UI at /graphiql
      enabled: true
    path: /graphql

server:
  port: ${PORT:8080}

logging:
  level:
    com.graphqlms: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
